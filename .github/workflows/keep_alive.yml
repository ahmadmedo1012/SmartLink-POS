name: Keep Website Alive

on:
  schedule:
    # GitHub minimum is 5 min. Each run loops 5×60s = 5 min → effectively pings every 1 min
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Every Minute
        run: |
          for i in $(seq 1 5); do
            curl -s -o /dev/null -w "%{http_code}" -I https://pos-m80w.onrender.com
            echo ""
            [ $i -lt 5 ] && sleep 60
          done
