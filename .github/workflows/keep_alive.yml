name: Keep Website Alive

on:
  schedule:
    # Minimum GitHub Actions cron interval
    - cron: '*/5 * * * *'
  # Also allow manual trigger
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Server Every 50 Seconds
        run: |
          for i in $(seq 1 6); do
            curl -s -o /dev/null -w "%{http_code}" -I https://pos-m80w.onrender.com
            echo ""
            sleep 50
          done
